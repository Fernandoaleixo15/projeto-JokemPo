<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projeto-JokemPÔ</title>
    <link rel="stylesheet" href="./css/style.css" />
    <script src="./js/script.js" defer></script>
  </head>
  <body>
    <header>
      <img class="logo" src="./assest/A (1).png" alt="logo do criador" />
      <nav class="menu-top">
        <a href="https://gx.games/pt-br/games/m8yx0s/jokenpo-pedra-papel-e-tesoura/ " target="_blank">Sobre</a>
        <a href="https://japanhousesp.com.br/jhsponline/jankenpon-conheca-a-historia-do-famosos-jogo/" target="_blank">Historia</a>
      </nav>
    </header>
    <main>
      <div class="container">
        <h1>JokemPô! Jogue se tiver Coragem</h1>
        <div class="butons">
          <button class="but-jodo" id="rock" onclick="playHuman('rock')">&#x1F44A;</button>
          <button class="but-jodo" id="paper" onclick="playHuman('paper')">&#x1F590;</button>
          <button class="but-jodo" id="scissors"onclick="playHuman('scrissors')">&#x270C;</button>
        </div>
        <p class="result"></p>

        <p class="your-score">Sua Pontuação: <span id="human-score">0</span></p>
        <p class="machine-score">Pontuação da Alexa: <span id="machine-score">0</span></p>

      </div>
    </main>
  </body>
</html>
